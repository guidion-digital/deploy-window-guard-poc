name: "Deploy Window Guard"
description: "Blocks PRs during sensitive times unless a bypass label is present"
inputs:
  bypass_label:
    description: "The label used to bypass the time restriction"
    required: false
    default: "bypass-deploy-window-guard"
  scheduled:
    description: "Whether this run was triggered by a schedule"
    required: false
    default: "false"
  start_hour_utc:
    description: "Hour to start the block (UTC, 0-23)"
    required: false
    default: "16"
  end_hour_utc:
    description: "Hour to end the block (UTC, 0-23)"
    required: false
    default: "08"

runs:
  using: "composite"
  steps:
    - name: Check Time and Label
      shell: bash
      run: |
        HOUR=$(date -u +"%H")
        DAY=$(date -u +"%u")
        IS_SENSITIVE=false

        echo "DEBUG: Hour is $HOUR, Day is $DAY"

        if [ "$HOUR" -ge "${{ inputs.start_hour_utc }}" ] || [ "$HOUR" -lt "${{ inputs.end_hour_utc }}" ]; then
          IS_SENSITIVE=true
          echo "DEBUG: Time trigger activated"
        fi

        if [ "$DAY" -eq 6 ] || [ "$DAY" -eq 7 ]; then
          IS_SENSITIVE=true
          echo "DEBUG: Weekend trigger activated"
        fi

        if [ "${{ inputs.scheduled }}" = "true" ]; then
          echo "DEBUG: Scheduled mode enabled"
          echo "$IS_SENSITIVE" > "$RUNNER_TEMP/deploy-guard-is-sensitive"
          echo "Success: Scheduled mode baseline check complete."
        else
          # Extract labels and check specifically for the bypass string
          RAW_LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "DEBUG: Labels found: $RAW_LABELS"

          # Check if the bypass label exists in the array
          if echo "$RAW_LABELS" | jq -e ". | contains([\"${{ inputs.bypass_label }}\"])" > /dev/null; then
            HAS_LABEL=true
          else
            HAS_LABEL=false
          fi

          echo "DEBUG: IS_SENSITIVE=$IS_SENSITIVE, HAS_LABEL=$HAS_LABEL"

          if [ "$IS_SENSITIVE" = "true" ] && [ "$HAS_LABEL" = "false" ]; then
            echo "::error title=Deployment Blocked::SENSITIVE WINDOW DETECTED. Apply the '${{ inputs.bypass_label }}' label to merge."
            echo "blocked" > "$RUNNER_TEMP/deploy-guard-blocked"
          elif [ "$IS_SENSITIVE" = "true" ] && [ "$HAS_LABEL" = "true" ]; then
            echo "bypass" > "$RUNNER_TEMP/deploy-guard-bypass"
            echo "Success: No restrictions active or bypass applied."
          else
            echo "Success: No restrictions active or bypass applied."
          fi
        fi

    - name: Comment on PR
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ inputs.scheduled }}" = "true" ]; then
          IS_SENSITIVE="$(cat "$RUNNER_TEMP/deploy-guard-is-sensitive" 2>/dev/null || echo "false")"
          echo "DEBUG: Scheduled mode IS_SENSITIVE=$IS_SENSITIVE"

          OPEN_PR_NUMBERS=$(gh pr list --repo "${{ github.repository }}" --state open --json number --jq '.[].number')
          for PR_NUMBER in $OPEN_PR_NUMBERS; do
            HAS_LABEL=false

            PR_LABELS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.labels[].name')
            if printf "%s\n" "$PR_LABELS" | jq -R -s 'split("\n")[:-1] | contains(["${{ inputs.bypass_label }}"])' | grep -q '^true$'; then
              HAS_LABEL=true
            fi

            if [ "$HAS_LABEL" = "true" ]; then
              echo "DEBUG: PR #$PR_NUMBER has bypass label, skipping."
              continue
            fi

            if [ "$IS_SENSITIVE" = "true" ]; then
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "[Autobot] Re-evaluate deployment time"
            fi
          done
          exit 0
        fi

        if [ -f "$RUNNER_TEMP/deploy-guard-blocked" ]; then
          gh pr comment ${{ github.event.pull_request.number }} --body "**Deployment blocked** - Sensitive window detected. Apply the \`${{ inputs.bypass_label }}\` label to merge."
        elif [ -f "$RUNNER_TEMP/deploy-guard-bypass" ]; then
          gh pr comment ${{ github.event.pull_request.number }} --body "**Bypass applied** - The \`${{ inputs.bypass_label }}\` label was found. Deployment is allowed during this window."
        fi

    - name: Fail if blocked
      shell: bash
      run: |
        if [ -f "$RUNNER_TEMP/deploy-guard-blocked" ]; then
          exit 1
        fi
