name: Re-evaluate Deploy Window Check

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 17 * * *"

jobs:
  trigger-pr-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger deploy window check on open PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pr in $(gh pr list --state open --json number -q '.[].number'); do
            gh pr comment "$pr" --body "<!-- recheck-deploy-window -->"
          done
