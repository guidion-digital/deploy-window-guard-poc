name: Run PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  deploy-window-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Needed for the gh CLI to pick up context from
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Deploy Window Check
        uses: guidion-digital/deploy-window-guard-poc/.github/actions/deploy-window-guard@master
        with:
          bypass_label: "bypass-deploy-window-guard"
          start_hour_utc: "17"
          end_hour_utc: "8"
