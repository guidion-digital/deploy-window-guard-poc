name: Run PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

jobs:
  deploy-window-check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '<!-- recheck-deploy-window -->'))
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set PR context for issue_comment
        if: github.event_name == 'issue_comment'
        id: pr_context
        run: |
          echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo 'labels<<EOF' >> "$GITHUB_OUTPUT"
          echo '${{ toJson(github.event.issue.labels.*.name) }}' >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Run Deploy Window Check
        uses: guidion-digital/deploy-window-guard-poc/.github/actions/deploy-window-guard@master
        with:
          bypass_label: "bypass-deploy-window-guard"
          start_hour_utc: "8"
          end_hour_utc: "17"
          pr_number: ${{ github.event_name == 'issue_comment' && steps.pr_context.outputs.number || github.event.pull_request.number }}
          labels_json: ${{ github.event_name == 'issue_comment' && steps.pr_context.outputs.labels || toJson(github.event.pull_request.labels.*.name) }}
